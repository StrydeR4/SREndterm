---
- name: Deploy MicroShop Application
  hosts: microshop_servers
  become: true

  vars:
    app_dir: /home/ubuntu/microshop
    repo_url: https://github.com/your-username/microshop.git
    docker_compose_version: "2.24.0"

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install required system packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - git
          - python3-pip
        state: present

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu focal stable"
        state: present

    - name: Install Docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present

    - name: Start and enable Docker
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Install Docker Compose
      get_url:
        url: "https://github.com/docker/compose/releases/download/v{{ docker_compose_version }}/docker-compose-linux-x86_64"
        dest: /usr/local/bin/docker-compose
        mode: '0755'

    - name: Clone repository
      git:
        repo: "{{ repo_url }}"
        dest: "{{ app_dir }}"
        force: yes
      become_user: ubuntu

    - name: Start application with Docker Compose
      community.docker.docker_compose_v2:
        project_src: "{{ app_dir }}"
        state: present
        build: always
      become_user: ubuntu

    - name: Wait for frontend to be available
      uri:
        url: "http://localhost:80"
        status_code: 200
      retries: 10
      delay: 5
      register: result
      until: result.status == 200

    - name: Print deployment result
      debug:
        msg: "MicroShop deployed successfully at http://{{ ansible_host }}"
